<style>
  :root{ --safe:#5fe3ff; --danger:#ff5a5a; --graze:#ffd34d; --fever:#ff4fa3; --super:#7affd8; --ink:#eaf2ff; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#04040c;}
  body{ font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    color:var(--ink); -webkit-user-select:none;user-select:none;touch-action:none; }
  #wrap{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}
  .screen{ position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:26px;gap:16px;z-index:10;
    background:radial-gradient(120% 90% at 50% 22%, rgba(20,16,46,.72), rgba(4,4,12,.95)); backdrop-filter:blur(2px); overflow-y:auto; }
  .hidden{display:none!important;}
  .title-wrap{ position:relative; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0 2px; }
  .title-wrap::before, .title-wrap::after{ content:""; position:absolute; left:50%; height:2px; width:min(78vw,420px);
    background:linear-gradient(90deg, transparent, rgba(95,227,255,0) 8%, rgba(95,227,255,.55) 50%, rgba(95,227,255,0) 92%, transparent);
    transform:translateX(-50%) skewX(-24deg); filter:blur(.3px); pointer-events:none; }
  .title-wrap::before{ top:12%; opacity:.5; }
  .title-wrap::after{ bottom:34%; opacity:.35; }
  .title{ position:relative; font-weight:800;font-style:italic;line-height:.82;
    transform:skewX(-9deg); text-align:center; }
  .title .g,.title .f{ display:block; letter-spacing:-2px; font-size:clamp(52px,17vw,108px); }
  .title .g{ color:#fff;
    text-shadow:0 0 6px #fff, 0 0 24px rgba(120,215,255,.9), 0 0 54px rgba(60,150,255,.7), -10px 0 30px rgba(60,150,255,.35); }
  .title .f{ margin-top:-6px;
    background:linear-gradient(180deg,#c4f4ff 0%,#5fe3ff 52%,#2b8fff 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:#5fe3ff;
    filter:drop-shadow(0 0 10px rgba(60,180,255,.9)) drop-shadow(0 0 34px rgba(60,150,255,.55)); }
  .divider{ display:flex;align-items:center;gap:10px;margin-top:6px;opacity:.9; }
  .divider .ln{ height:1px;width:clamp(48px,20vw,120px);background:linear-gradient(90deg,transparent,rgba(120,205,255,.85)); }
  .divider .ln.r{ background:linear-gradient(270deg,transparent,rgba(120,205,255,.85)); }
  .divider .ship{ color:#fff; font-size:12px; text-shadow:0 0 10px rgba(95,227,255,.95); transform:translateY(-1px); }
  .tagline{ font-weight:800;font-style:italic;letter-spacing:3px;font-size:clamp(14px,4.4vw,20px);color:#fff;
    text-shadow:0 0 14px rgba(95,227,255,.6); margin-top:8px; }
  .subtag{ font-weight:700;font-style:italic;letter-spacing:3px;font-size:11px;color:#7fd4ff;
    text-transform:uppercase; text-shadow:0 0 12px rgba(60,150,255,.5); }
  /* 言語トグル EN | JP */
  .lang-toggle{ display:inline-flex;align-items:stretch;gap:0;padding:3px;border-radius:999px;
    border:1px solid rgba(95,227,255,.35); background:rgba(8,18,30,.55); backdrop-filter:blur(4px); }
  .lang-btn{ appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:800;font-style:italic;
    letter-spacing:1.5px;font-size:13px;padding:7px 20px;border-radius:999px;color:#7fa7c8;background:transparent;transition:all .16s ease; }
  .lang-btn.active{ color:#04121c; background:linear-gradient(135deg,#7affd8,#5fe3ff 55%,#2b9bff);
    box-shadow:0 4px 16px rgba(60,160,255,.45), inset 0 1px 0 rgba(255,255,255,.5); }
  .lang-toggle.mini{ padding:2px; }
  .lang-toggle.mini .lang-btn{ padding:4px 13px;font-size:11px;letter-spacing:1px; }
  .tag{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:#9fb0d0;font-weight:600;}
  .rules{ max-width:360px;font-size:14px;line-height:1.65;color:#d3deee;
    background:rgba(120,190,255,.05);border:1px solid rgba(120,190,255,.14);border-radius:16px;padding:10px 16px 12px;
    display:flex;flex-direction:column;gap:8px; }
  .rules .lang-toggle{ align-self:flex-start; }
  .rules-text{ display:flex;flex-direction:column; }
  .rules-text .ri{ text-align:center;padding:8px 2px; }
  .rules-text .ri + .ri{ border-top:1px solid rgba(120,195,255,.15); }
  .rules b{color:var(--graze);} .rules .fv{color:var(--fever);} .rules .gz{color:var(--graze);} .rules .sp{color:var(--super);} .rules .op{color:var(--safe);}
  .btn{ appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:800;font-style:italic;letter-spacing:2px;
    font-size:24px;color:#04121c;padding:16px 62px;border-radius:999px;
    background:linear-gradient(135deg,#7affd8,#5fe3ff 50%,#2b9bff);
    box-shadow:0 10px 34px rgba(60,160,255,.5), inset 0 1px 0 rgba(255,255,255,.6), 0 0 0 1px rgba(120,205,255,.4);
    text-shadow:0 1px 6px rgba(255,255,255,.25); transition:transform .08s ease; }
  #startBtn{ animation:startPulse 1.8s ease-in-out infinite; }
  @keyframes startPulse{ 0%,100%{ box-shadow:0 10px 34px rgba(60,160,255,.5), inset 0 1px 0 rgba(255,255,255,.6), 0 0 0 1px rgba(120,205,255,.4); }
    50%{ box-shadow:0 12px 46px rgba(60,180,255,.85), inset 0 1px 0 rgba(255,255,255,.65), 0 0 0 1px rgba(150,220,255,.75); } }
  #ctrlBtn{ appearance:none;border:1px solid rgba(95,227,255,.4);background:rgba(8,18,30,.5);color:#5fe3ff;font-family:inherit;font-weight:800;font-style:italic;font-size:13px;letter-spacing:1px;padding:9px 22px;border-radius:999px;margin-top:10px;cursor:pointer; }
  .btn2{ appearance:none;border:1px solid rgba(95,227,255,.5);background:rgba(8,18,30,.5);color:#5fe3ff;
    font-family:inherit;font-weight:800;font-style:italic;letter-spacing:1.5px;font-size:16px;
    padding:11px 40px;border-radius:999px;margin-top:2px;cursor:pointer;transition:transform .08s ease; }
  .btn2:active{ transform:scale(.95); }
  .rank-head{ font-weight:800;font-style:italic;font-size:clamp(30px,9vw,46px);letter-spacing:-1px;color:#fff;
    transform:skewX(-8deg); text-shadow:0 0 8px #fff,0 0 26px rgba(95,227,255,.8),0 0 54px rgba(60,150,255,.5); }
  .btn:active{transform:scale(.95);}
  .btn.f{background:linear-gradient(135deg,#5fe3ff,#2b9bff);box-shadow:0 8px 30px rgba(60,160,255,.42), inset 0 1px 0 rgba(255,255,255,.6);}
  .result{font-size:clamp(34px,10vw,58px);font-weight:800;font-style:italic;}
  .result.lose{color:var(--danger);text-shadow:0 0 26px rgba(255,90,90,.45);}
  .scoreline{font-size:14px;letter-spacing:1px;color:#cdd8ee;}
  .scoreline .num{font-size:30px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
  .best{font-size:13px;color:#9fd0ff;letter-spacing:1px;}
  .myrank{font-size:16px;font-weight:800;font-style:italic;letter-spacing:1px;color:#5fe3ff;text-shadow:0 0 14px rgba(60,160,255,.5);}
  .name-entry{display:flex;gap:8px;align-items:center;}
  #nameInput{appearance:none;border:1px solid rgba(95,227,255,.4);background:rgba(8,18,30,.6);color:#eaf2ff;
    font-family:inherit;font-weight:700;font-size:15px;letter-spacing:1px;text-align:center;
    padding:10px 12px;border-radius:12px;width:130px;text-transform:uppercase;}
  #nameInput:focus{outline:none;border-color:#5fe3ff;box-shadow:0 0 0 2px rgba(95,227,255,.25);}
  .btn.sm{font-size:15px;padding:11px 24px;letter-spacing:1px;animation:none;color:#04121c;}
  .rank-tabs{display:flex;gap:6px;margin-top:2px;}
  .rank-tab{appearance:none;border:1px solid rgba(95,227,255,.3);background:rgba(8,18,30,.5);color:#7fb0d0;
    font-family:inherit;font-weight:800;font-style:italic;font-size:12px;letter-spacing:1px;padding:6px 16px;border-radius:999px;cursor:pointer;transition:all .15s;}
  .rank-tab.active{color:#04121c;background:linear-gradient(135deg,#7affd8,#5fe3ff);border-color:transparent;}
  .ranking{width:100%;max-width:340px;margin-top:2px;max-height:36vh;overflow-y:auto;}
  .rk-title{font-size:11px;letter-spacing:2px;color:#9fb0d0;margin-bottom:5px;}
  .rk-row{display:flex;align-items:center;gap:9px;padding:5px 10px;border-radius:8px;font-size:14px;font-variant-numeric:tabular-nums;}
  .rk-row.me{background:rgba(122,255,216,.14);border:1px solid rgba(122,255,216,.3);}
  .rk-pos{width:20px;color:#ffd34d;font-weight:800;font-style:italic;text-align:center;flex:none;}
  .rk-name{flex:1;text-align:left;font-weight:700;color:#cfe0f2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rk-score{flex:none;text-align:right;font-weight:700;color:#fff;min-width:60px;}
  .rk-stage{font-size:11px;color:#9fb0d0;flex:none;min-width:52px;text-align:right;}
  .rk-load{font-size:12px;color:#7fb0d0;letter-spacing:2px;padding:12px;}
  #sound{ position:absolute;top:calc(env(safe-area-inset-top,0) + 12px);right:14px;z-index:20;
    width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.16);
    background:rgba(14,12,32,.6);color:var(--ink);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .credit{font-size:11px;color:#5e6a85;letter-spacing:1px;}
</style>

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <button id="sound" aria-label="Toggle sound">♪</button>

  <div id="menu" class="screen">
    <div class="title-wrap">
      <div class="title"><span class="g">GRAZE</span><span class="f">FEVER</span></div>
      <div class="divider"><span class="ln"></span><span class="ship">▲</span><span class="ln r"></span></div>
      <div class="tagline">DODGE. GRAZE. FEVER.</div>

    </div>
    <div class="rules" id="rulesBox">
      <div class="lang-toggle mini" id="langToggle">
        <button class="lang-btn active" data-lang="en">EN</button>

      <button class="rank-tab" data-kind="month">THIS MONTH</button>
    </div>
    <div id="rankViewList" class="ranking"></div>
    <button id="rankBackBtn" class="btn">BACK</button>
  </div>
</div>

<script>
(()=>{
"use strict";

const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBackground();
}
window.addEventListener('resize',resize);

// ====== オーディオ ======
let AC=null, sfxGain=null, musicGain=null, soundOn=true;
function initAudio(){
  if(AC) return;
  try{ AC=new (window.AudioContext||window.webkitAudioContext)();
    sfxGain=AC.createGain(); sfxGain.gain.value=0.5; sfxGain.connect(AC.destination);
    musicGain=AC.createGain(); musicGain.gain.value=0.4; musicGain.connect(AC.destination);
  }catch(e){ AC=null; }
}
function blip(f,d,type='square',v=0.2){ if(!AC||!soundOn) return;
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(v,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.connect(g);g.connect(sfxGain);o.start();o.stop(AC.currentTime+d); }
function sweep(f1,f2,d,type='sawtooth',v=0.25){ if(!AC||!soundOn) return;
  const o=AC.createOscillator(),g=AC.createGain(); o.type=type;o.frequency.setValueAtTime(f1,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f2,AC.currentTime+d);
  g.gain.setValueAtTime(v,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.connect(g);g.connect(sfxGain);o.start();o.stop(AC.currentTime+d); }
const sfx={
  shoot(){ blip(880,.03,'square',.026); },
  graze(){ blip(1320,.06,'triangle',.16); blip(1760,.05,'triangle',.09); },
  kill(){ blip(200,.10,'sawtooth',.12); },
  hit(){ sweep(300,55,.4,'sawtooth',.42); blip(90,.20,'sine',.55); blip(170,.13,'square',.26); },
  fever(){ sweep(330,1200,.5,'square',.22); },
  super(){ sweep(500,1800,.6,'square',.26); blip(1320,.3,'triangle',.16); },
  power(){ blip(1040,.08,'triangle',.18); blip(1560,.08,'triangle',.14); },
  option(){ blip(660,.08,'triangle',.18); blip(990,.1,'triangle',.16); blip(1320,.1,'triangle',.12); },
  shield(){ blip(440,.1,'triangle',.2); blip(660,.1,'triangle',.18); blip(880,.12,'triangle',.16); },
  shieldHit(){ blip(900,.07,'triangle',.2); blip(1300,.05,'triangle',.13); },
  boss(){ sweep(150,55,1.0,'sawtooth',.3); },
  stage(){ [523,659,880].forEach((f,i)=>setTimeout(()=>blip(f,.2,'triangle',.2),i*110)); },
  win(){ [523,659,784,1046,1318,1568].forEach((f,i)=>setTimeout(()=>blip(f,.2,'triangle',.22),i*130)); },
  start(){ sweep(300,900,.22,'square',.22); [587.33,880,1174.66].forEach((f,i)=>setTimeout(()=>blip(f,.16,'triangle',.22),i*70)); setTimeout(()=>blip(1760,.22,'triangle',.14),150); },
  ui(){ blip(880,.05,'triangle',.12); blip(1320,.05,'triangle',.08); },
};

// ====== BGM ======
const MUSIC_VARIANTS={
  1:{ roots:[110,110,87.31,87.31], chords:[[220,261.63,329.63],[220,261.63,329.63],[174.61,220,261.63],[174.61,220,261.63]], arp:null },
  2:{ roots:[82.41,82.41,65.41,65.41], chords:[[164.81,196,246.94],[164.81,196,246.94],[261.63,329.63,392],[261.63,329.63,392]], arp:[0,0,392,0,0,0,329.63,0] },
  3:{ roots:[65.41,98,110,87.31], chords:[[261.63,329.63,392],[196,246.94,293.66],[220,261.63,329.63],[174.61,220,261.63]], arp:[523.25,659.25,783.99,659.25], sky:true },
  4:{ roots:[73.42,73.42,98.00,98.00], chords:[[146.83,174.61,220],[146.83,174.61,220],[196,233.08,293.66],[196,233.08,293.66]], arp:[0,0,0,0,587.33,0,0,0,0,0,440,0,0,0,0,0] },
};
const Music={
  on:false,timer:null,next:0,step:0,bars:4,tempo:130,rate:1,variant:1,noiseBuf:null,
  ensureNoise(){ if(this.noiseBuf||!AC) return; const n=Math.floor(AC.sampleRate*0.25), b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1; this.noiseBuf=b; },
  start(){ if(!AC||this.on||!soundOn) return; this.ensureNoise(); this.on=true; this.step=0; this.next=AC.currentTime+0.08; this.timer=setInterval(()=>this.tick(),25); },
  stop(){ this.on=false; if(this.timer){clearInterval(this.timer);this.timer=null;} },
  tick(){ if(!this.on||!AC) return; while(this.next<AC.currentTime+0.12){ this.playStep(this.step,this.next); this.next+=(60/this.tempo/4)/this.rate; this.step=(this.step+1)%(16*this.bars); } },
  kick(t){ const o=AC.createOscillator(),g=AC.createGain(); o.type='sine'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12);
    g.gain.setValueAtTime(0.7,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16); o.connect(g);g.connect(musicGain);o.start(t);o.stop(t+0.18); },
  bass(f,t,d,v){ const o=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter(); o.type='sawtooth'; o.frequency.value=f;
    lp.type='lowpass'; lp.frequency.value=480+(this.rate>1?450:0); lp.Q.value=7;
    g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d); o.connect(lp);lp.connect(g);g.connect(musicGain);o.start(t);o.stop(t+d+0.02); },
  stab(freqs,t,d,v){ const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.setValueAtTime(2600,t); lp.frequency.exponentialRampToValueAtTime(700,t+d); lp.Q.value=4;
    const g=AC.createGain(); g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+d); lp.connect(g); g.connect(musicGain);
    for(const f of freqs){ const o=AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.detune.value=Math.random()*8-4; o.connect(lp); o.start(t); o.stop(t+d+0.02); } },
  note(f,t,d,type,v){ if(!f) return; const o=AC.createOscillator(),g=AC.createGain(); o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(v,t+0.006); g.gain.exponentialRampToValueAtTime(0.0001,t+d); o.connect(g);g.connect(musicGain);o.start(t);o.stop(t+d+0.02); },
  hat(t,v,open){ if(!this.noiseBuf) return; const s=AC.createBufferSource(); s.buffer=this.noiseBuf; const hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
    const g=AC.createGain(); g.gain.setValueAtTime(v,t); g.gain.exponentialRampToValueAtTime(0.0001,t+(open?0.12:0.05)); s.connect(hp);hp.connect(g);g.connect(musicGain);s.start(t);s.stop(t+(open?0.14:0.06)); },
  clap(t){ if(!this.noiseBuf) return; for(let k=0;k<2;k++){ const tt=t+k*0.011; const s=AC.createBufferSource(); s.buffer=this.noiseBuf;
      const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1600; bp.Q.value=1.3;
      const g=AC.createGain(); g.gain.setValueAtTime(0.16,tt); g.gain.exponentialRampToValueAtTime(0.0001,tt+0.12); s.connect(bp);bp.connect(g);g.connect(musicGain);s.start(tt);s.stop(tt+0.14); } },
  playStep(step,t){
    const V=MUSIC_VARIANTS[this.variant]||MUSIC_VARIANTS[1];
    const s=step%16, bar=Math.floor(step/16)%4, bassRoot=V.roots[bar], chord=V.chords[bar];
    if(s%4===0) this.kick(t);
    if(s===4||s===12) this.clap(t);
    if(s%2===0 && s%4!==0) this.hat(t,0.13,true);
    if(s%2===1) this.hat(t,0.05,false);
    if(s===2||s===6||s===10||s===14) this.bass(bassRoot,t,0.16,0.32);
    if(s===0) this.bass(bassRoot/2,t,0.12,0.20);
    if(s===0||s===6) this.stab(chord,t,0.18,V.sky?0.13:0.15);
    if(bar===3 && (s===10||s===12||s===14)) this.stab(chord,t,0.10,0.11);
    if(V.arp){ if(V.sky){ if(s%2===0) this.note(V.arp[(s>>1)%V.arp.length],t,0.11,'triangle',0.11); }
               else this.note(V.arp[s%V.arp.length],t,0.10,'square',0.08); }
    if(this.rate>1.04){ const ar=[chord[0]*2,chord[2]*2,chord[1]*2,chord[2]*2][(s>>2)%4]; if(s%2===0) this.note(ar,t,0.09,'sawtooth',0.07); }
    if(this.rate>1.14 && s%2===1) this.note(chord[2]*2,t,0.06,'square',0.05);
    if(this.rate>1.24 && (s===3||s===11)) this.note(chord[0]*4,t,0.07,'square',0.06);

let forest=[], stars=[], panels=[];
function buildBackground(){
  forest=[]; stars=[]; panels=[];
  const fn=Math.floor(W*H/14000)+22;
  for(let i=0;i<fn;i++) forest.push({x:Math.random()*W,y:Math.random()*H,r:30+Math.random()*90,ci:(Math.random()*4)|0});
  const sn=Math.min(150,Math.floor(W*H/4800));
  for(let i=0;i<sn;i++){ const layer=(Math.random()*3)|0; stars.push({x:Math.random()*W,y:Math.random()*H,layer,r:0.6+layer*0.6}); }
  const pn=Math.floor(W*H/26000)+10;
  for(let i=0;i<pn;i++) panels.push({x:Math.random()*W,y:Math.random()*H,w:34+Math.random()*70,h:22+Math.random()*46,s:(Math.random()*3)|0,light:Math.random()<0.34,lc:Math.random()<0.5?'255,70,70':'255,180,60'});
}
function frac(x){ return x-Math.floor(x); }
function drawBackground(t,speed,theme){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,theme.base1); g.addColorStop(1,theme.base0);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  if(theme.type==='space') drawSpace(t,speed);
  else if(theme.type==='forest') drawForest(t,speed,theme);
  else if(theme.type==='sky') drawSky(t,speed);
  else drawBase(t,speed);
  const v=ctx.createRadialGradient(W/2,H*0.5,Math.min(W,H)*0.35,W/2,H*0.5,Math.max(W,H)*0.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,theme.type==='sky'?'rgba(20,40,70,0.42)':'rgba(0,0,0,0.48)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}
function drawSpace(t,speed){
  for(let k=0;k<2;k++){ const nx=W*(k?0.74:0.26), ny=H*(k?0.62:0.3);
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,Math.max(W,H)*0.5);
    ng.addColorStop(0,k?'rgba(90,45,150,0.12)':'rgba(40,80,170,0.12)'); ng.addColorStop(1,'rgba(0,0,0,0)'); ctx.fillStyle=ng; ctx.fillRect(0,0,W,H); }
  for(const s of stars){ const yy=(s.y + t*((s.layer+1)*60)*speed)%H; const tw=s.layer===2?(0.6+0.4*Math.sin(t*4+s.x)):1;
    ctx.fillStyle=`rgba(${s.layer===2?'205,225,255':'170,190,235'},${(0.3+s.layer*0.22)*tw})`; ctx.fillRect(s.x,yy,s.r,s.r+s.layer); }
}
function drawForest(t,speed,theme){
  const scroll=(t*60*speed)%H; ctx.globalAlpha=0.92;
  for(const b of forest){ const yy=(b.y+scroll)%H; ctx.fillStyle=theme.blobs[b.ci];
    ctx.beginPath(); ctx.arc(b.x,yy,b.r,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(b.x,yy-H,b.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  for(let i=0;i<28;i++){ const sx=frac(Math.sin(i*12.9898)*43758.5453)*W; const by=frac(Math.sin(i*78.233)*12345.678)*H; const yy=(by + t*40*speed)%H;
    ctx.fillStyle=`rgba(${theme.spec},0.3)`; ctx.beginPath(); ctx.arc(sx+Math.sin(t*1.5+i)*8,yy,1.4,0,7); ctx.fill(); }
}
function drawCloud(x,y,r){
  ctx.fillStyle='rgba(255,255,255,0.50)'; ctx.beginPath(); ctx.arc(x,y,r*0.6,0,7); ctx.arc(x+r*0.5,y+r*0.12,r*0.45,0,7); ctx.arc(x-r*0.5,y+r*0.14,r*0.4,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.beginPath(); ctx.arc(x,y-r*0.18,r*0.42,0,7); ctx.fill();
}
function drawSky(t,speed){
  const sg=ctx.createRadialGradient(W*0.8,H*0.12,0,W*0.8,H*0.12,Math.max(W,H)*0.55);
  sg.addColorStop(0,'rgba(255,250,210,0.45)'); sg.addColorStop(1,'rgba(255,250,210,0)'); ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  const scroll=(t*55*speed)%H; for(const b of forest){ const yy=(b.y+scroll)%H; drawCloud(b.x,yy,b.r); drawCloud(b.x,yy-H,b.r); }
}
function drawBase(t,speed){
  const scroll=(t*80*speed), cell=46, off=scroll%cell;
  ctx.strokeStyle='rgba(90,110,150,0.10)'; ctx.lineWidth=1;
  for(let y=-cell;y<H+cell;y+=cell){ ctx.beginPath(); ctx.moveTo(0,y+off); ctx.lineTo(W,y+off); ctx.stroke(); }
  for(let x=cell/2;x<W;x+=cell){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  const sh=['#171c28','#1d2433','#232c3e'], ps=scroll%H;
  for(const p of panels){ const yy=(p.y+ps)%H; for(const oy of [yy,yy-H]){
    ctx.fillStyle=sh[p.s]; ctx.fillRect(p.x-p.w/2,oy-p.h/2,p.w,p.h);
    ctx.strokeStyle='rgba(120,140,180,0.18)'; ctx.lineWidth=1; ctx.strokeRect(p.x-p.w/2,oy-p.h/2,p.w,p.h);
    ctx.fillStyle='rgba(120,140,180,0.10)'; ctx.fillRect(p.x-p.w/2+3,oy-p.h/2+3,p.w-6,3);
    if(p.light){ const bl=0.3+0.7*Math.abs(Math.sin(t*3+p.x)); ctx.fillStyle='rgba('+p.lc+','+bl+')'; ctx.beginPath(); ctx.arc(p.x+p.w/2-5,oy+p.h/2-5,2.4,0,7); ctx.fill(); } } }
  ctx.fillStyle='rgba(40,48,66,0.5)'; ctx.fillRect(0,0,10,H); ctx.fillRect(W-10,0,10,H);
  ctx.fillStyle='rgba(255,180,60,0.10)'; for(let y=-30;y<H+30;y+=60){ const yy=y+(scroll%60); ctx.fillRect(0,yy,10,16); ctx.fillRect(W-10,yy,10,16); }
}

    : stage===2 ? [['bug',.22],['wasp',.24],['moth',.13],['beetle',.11],['spore',.14],['hornet',.16]]
    : stage===3 ? [['bug',.22],['wasp',.24],['moth',.12],['beetle',.12],['spore',.14],['hornet',.16]]
    : [['bug',.30],['wasp',.20],['moth',.12],['beetle',.10],['spore',.12],['hornet',.16]];
  let r=Math.random(); for(const [k,w] of table){ if((r-=w)<=0) return k; } return 'bug';

function firePlayer(dt){
  game.fireCd-=dt; if(game.fireCd>0) return;
  const lv=game.feverLevel; game.fireCd=[0.11,0.07,0.05,0.04][lv];
  const p=game.player, spd=660, ways=[0,3,5,7][lv];
  if(ways===0){ game.pBullets.push({x:p.x-6,y:p.y-12,vx:0,vy:-spd,r:3.4,big:false}); game.pBullets.push({x:p.x+6,y:p.y-12,vx:0,vy:-spd,r:3.4,big:false}); }
  else { const spread=0.17, start=-Math.PI/2 - spread*(ways-1)/2;
    for(let i=0;i<ways;i++){ const a=start+spread*i; game.pBullets.push({x:p.x,y:p.y-12,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:3.6+lv*0.2,big:true}); } }
  for(const o of game.options){ if(lv>0){ game.pBullets.push({x:o.x,y:o.y-8,vx:-70,vy:-spd,r:3.2,big:false}); game.pBullets.push({x:o.x,y:o.y-8,vx:70,vy:-spd,r:3.2,big:false}); }
    else game.pBullets.push({x:o.x,y:o.y-8,vx:0,vy:-spd,r:3.2,big:false}); }
  sfx.shoot();
}
let emitP=1; // 弾数間引き係数（ボス0.75 / 敵0.90）

function popScore(x,y,amount,big){ if(amount<=0) return; const pw=game.power, fl=game.feverLevel;

  const life = (big?1.3:0.85)+tier*0.15;
  game.floats.push({x,y:y-6,vy:-(big?60:46),life,max:life,text:'+'+Math.round(amount).toLocaleString(),size,color,glow:tier>=2||big}); }

  burst(e.x,e.y,'#ffd0a0',14,200,.55); const sc0=game.score; addScore(KINDS[e.kind].score); popScore(e.x,e.y,game.score-sc0); game.fever=Math.min(FEVER_CAP,game.fever+2); sfx.kill();
  if(e.kind==='spore'){ for(let k=0;k<8;k++){const a=k/8*7; eShot(e.x,e.y,Math.cos(a)*150,Math.sin(a)*150,5);} }
  if(e.kind==='beetle'){ for(let k=0;k<8;k++){const a=k/8*7; eShot(e.x,e.y,Math.cos(a)*120,Math.sin(a)*120,5);} }
  if(e.kind==='carrier'){ game.items.push({x:e.x,y:e.y,vy:80,r:12,type:'heart'}); burst(e.x,e.y,'#ff7a9a',18,210,.6); }
  else { const roll=Math.random();
    if(game.options.length<MAX_OPTIONS && roll<0.05) game.items.push({x:e.x,y:e.y,vy:90,r:11,type:'option'});
    else if(roll<0.09) game.items.push({x:e.x,y:e.y,vy:90,r:12,type:'shield'});
    else if(roll<0.18) game.items.push({x:e.x,y:e.y,vy:90,r:11,type:'fever'}); }
}
function doGraze(x,y,tier){ tier=tier||0; game.combo++; game.comboTimer=2;
  const mulT=tier>=1?1.4:1.0;
  addScore(Math.round((50+game.combo*6)*mulT));
  game.fever=Math.min(FEVER_CAP,game.fever+(tier>=1?18:14)); // グレイズ上昇量を倍
  const np=game.combo>=25?2:game.combo>=10?1.5:1; if(np>game.power){ game.power=np; game.powerPop={t:1.3,n:np}; sfx.power(); burst(game.player.x,game.player.y,np>=2?'#ff5a5a':'#ff9a3d',24,260,.7); }
  // 距離連動の演出（FAR / NEAR）
  const n=10+tier*8, spd=120+tier*70; for(let i=0;i<n;i++){ const a=(i/n)*7; game.parts.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:.35+tier*0.1,max:.35+tier*0.1,color:'#ffd34d',r:2.2+tier*0.8}); }
  if(tier>=1){ game.grazeFlash=Math.max(game.grazeFlash,0.18); game.grazeCol='255,211,120'; blip(1560,.06,'triangle',.18); blip(2080,.05,'triangle',.1); }
  else sfx.graze();
}
function hitPlayer(){
  const p=game.player; if(p.inv>0) return;
  game.lives--; game.combo=0; game.power=1; p.inv=2.0;
  game.shake=26; game.hitFlash=0.5; game.hitPos={x:p.x,y:p.y};
  burst(p.x,p.y,'#ff4040',30,300,.8); burst(p.x,p.y,'#fff',16,200,.5); sfx.hit(); vibrate([0,90,40,60]);
  if(game.lives<=0) endGame();
}

// ====== エンディング / ゲームオーバー ======
function restoreCarry(){
  if(game.carryFever>0){ game.fever=Math.max(game.fever, game.carryFever*FEVER_MAX + 60); game.feverLevel=game.carryFever; }
  const want=Math.min(MAX_OPTIONS, game.carryOpt||0);
  while(game.options.length<want){ game.options.push({x:game.player?game.player.x:W/2,y:game.player?game.player.y:H*0.7,t:13}); }
  for(const o of game.options) o.t=Math.max(o.t,13);
  game.carryFever=0; game.carryOpt=0;
}
function startEnding(){
  state=ST.ENDING; game.endT=ENDING_DUR; game.fwT=0; game.boss=null; game.eBullets.length=0;
  game.carryFever=game.feverLevel; game.carryOpt=game.options.length;
  game.feverLevel=0; game.fever=0; game.shieldT=0; best=Math.max(best,game.score); sfx.win();
}
function reachedLabel(stage,loop){ return STAGE_NAMES[stage]+' (STAGE '+(loop*4+stage)+')'; }
function stageLabel(stage,loop){ return 'STAGE '+(loop*4+stage); }

async function endGame(){

  mySubmitEntry={ name:(lastName||'YOU'), score:game.score, stage:game.stage, loop:game.loop, date:new Date().toISOString(), month:curMonth() };

// ====== 更新 ======
function update(dt){
  game.time+=dt;
  const feverOn=game.feverLevel>0;
  const formFreeze=!!(game.boss && game.boss.formT>0); // 最終形態移行中は強化状態を凍結
  game.scroll+=dt*(feverOn?2.2:1);
  if(game.shake>0) game.shake=Math.max(0,game.shake-dt*60);
  if(game.shieldT>0 && !formFreeze) game.shieldT-=dt;
  if(game.hitFlash>0) game.hitFlash-=dt;
  if(game.formFlash>0) game.formFlash-=dt;
  if(game.slowCd>0) game.slowCd-=dt;
  if(game.slowT>0) game.slowT-=dt;
  if(game.grazeFlash>0) game.grazeFlash-=dt;
  if(game.newBestPop>0) game.newBestPop-=dt;
  for(let i=game.floats.length-1;i>=0;i--){ const f=game.floats[i]; f.life-=dt; f.y+=f.vy*dt; f.vy*=0.92; if(f.life<=0) game.floats.splice(i,1); }
  if(!game.newBest && game.prevBest>0 && game.score>game.prevBest){ game.newBest=true; game.newBestPop=1.9; sfx.super(); }

  if(game.banner.t>0) game.banner.t-=dt;
  if(game.transTo>0){ game.transTo-=dt; if(game.transTo<=0){
      game.stage=game.transNext; game.wave=0; game.spawnT=0.8; game.enemies.length=0; game.eBullets.length=0; game.midDone=false; game.finalDone=false;
      restoreCarry(); // 前ステージ終わりの強化状態を10秒維持
      Music.variant=game.stage; game.banner={t:2.2,title:'STAGE '+(game.loop*4+game.stage),sub:STAGE_NAMES[game.stage]||''}; } }

  const p=game.player;
  const ease=0.28+(feverOn?0.08:0);
  p.x+=((pointer.x)-p.x)*ease; p.y+=((pointer.y)-p.y)*ease;
  p.x=Math.max(14,Math.min(W-14,p.x)); p.y=Math.max(60,Math.min(H-30,p.y));
  if(p.inv>0) p.inv-=dt;

  game.trail.unshift({x:p.x,y:p.y}); if(game.trail.length>90) game.trail.pop();
  for(let i=game.options.length-1;i>=0;i--){ const o=game.options[i];
    if(!formFreeze){ o.t-=dt; if(o.t<=0){ burst(o.x,o.y,'#5fe3ff',8,150,.4); game.options.splice(i,1); continue; } }
    const tgt=game.trail[Math.min(game.trail.length-1,(i+1)*16)]||p; o.x+=(tgt.x-o.x)*0.4; o.y+=(tgt.y-o.y)*0.4; }

  // フィーバー（連続バー）：グレイズで貯まり、放置で減少。満タンで昇格・空で降格
  if(!formFreeze && game.fever>0) game.fever=Math.max(0, game.fever - FEVER_DRAIN*dt);
  if(game.fever>FEVER_CAP) game.fever=FEVER_CAP;
  const nlv = game.fever>=FEVER_MAX*3?3 : game.fever>=FEVER_MAX*2?2 : game.fever>=FEVER_MAX?1 : 0;
  if(nlv>game.feverLevel){ game.feverLevel=nlv; if(nlv===1) sfx.fever(); else sfx.super();
    burst(p.x,p.y,FEVER_COL[nlv],40+nlv*8,360,1.0); game.shake=8+nlv*3; vibrate([20,30,20]); }
  else if(nlv<game.feverLevel){ game.feverLevel=nlv; if(nlv>0){ burst(p.x,p.y,FEVER_COL[nlv],22,260,.6); blip(520,.09,'sine',.12); } }
  game.mult=[1,2,3,4][game.feverLevel]; Music.rate=1+game.feverLevel*0.1;
  if(game.comboTimer>0){ game.comboTimer-=dt; if(game.comboTimer<=0){ game.combo=0; game.power=1; } }
  if(game.powerPop){ game.powerPop.t-=dt; if(game.powerPop.t<=0) game.powerPop=null; }

  firePlayer(dt);

  // スポーン
  if(game.bossWarn>0) game.bossWarn-=dt;
  const onScreenMax=Math.min(5,3+game.stage);
  const canSpawn=game.banner.t<=0 && game.transTo<=0 && !game.boss && game.bossWarn<=0;
  const spInterval = game.stage===1 ? Math.max(1.8,3.0-game.wave*0.12) : game.stage===2 ? Math.max(1.2,2.2-game.wave*0.13) : Math.max(1.0,2.0-game.wave*0.13);
  function tryWave(){ if(canSpawn){ game.spawnT-=dt; if(game.spawnT<=0 && game.enemies.length<onScreenMax){ spawnWave(); game.spawnT=spInterval; } } }
  if(!game.boss && game.transTo<=0){
    if(game.stage<4){
      const wavesNeeded=game.stage===1?6:game.stage===2?8:9;
      if(game.wave<wavesNeeded) tryWave(); else if(game.enemies.length===0 && canSpawn) spawnBoss();
    } else {
      if(!game.midDone){ if(game.wave<4) tryWave(); else if(game.enemies.length===0 && canSpawn) spawnBoss('mid'); }
      else if(!game.finalDone){ if(game.wave<6) tryWave(); else if(game.enemies.length===0 && canSpawn) spawnBoss('final'); }
      else if(game.loop>=1){ if(game.enemies.length===0 && canSpawn) spawnBoss('hidden'); }
    }
  }

  // 自機弾
  for(let i=game.pBullets.length-1;i>=0;i--){
    const b=game.pBullets[i]; b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.y<-20||b.x<-20||b.x>W+20){ game.pBullets.splice(i,1); continue; }
    let hit=false; const dmg=(b.big?2:1)*game.power; // コンボ連動の攻撃力倍率
    for(const e of game.enemies){ if((b.x-e.x)**2+(b.y-e.y)**2<(e.r+b.r)**2){ e.hp-=dmg; hit=true; burst(b.x,b.y,'#fff',3,90,.25); if(e.hp<=0)e._dead=true; break; } }
    if(!hit && game.boss && !game.boss.enter){ const bo=game.boss;
      for(const pt of bo.parts){ if(pt.dead) continue; const px=bo.x+pt.dx, py=bo.y+pt.dy;
        if((b.x-px)**2+(b.y-py)**2<(pt.r+b.r)**2){ bo.hp-=dmg; pt.hp-=dmg; hit=true; burst(b.x,b.y,'#fff',3,90,.25);
          if(pt.hp<=0){ pt.dead=true; onPartDestroyed(bo,pt); } break; } }
      if(!hit && (b.x-bo.x)**2+(b.y-bo.y)**2<(bo.r+b.r)**2){ bo.hp-=dmg; hit=true; burst(b.x,b.y,'#fff',3,90,.25); if(Math.random()<.5)burst(b.x,b.y,'#ff4fa3',2,120,.3); } }
    if(hit) game.pBullets.splice(i,1);
  }
  for(let i=game.enemies.length-1;i>=0;i--){ if(game.enemies[i]._dead){ killEnemy(game.enemies[i]); game.enemies.splice(i,1);} }

  // 敵（周回で難化）
  const loopSpd=1+game.loop*0.06, loopFire=1-Math.min(0.45,game.loop*0.05);
  const sMul=(game.stage>=4?1.16:game.stage===3?1.16:game.stage===2?1.15:1)*loopSpd;
  const fMul=(game.stage>=4?0.84:game.stage===3?0.82:game.stage===2?0.82:1.05)*loopFire;
  for(let i=game.enemies.length-1;i>=0;i--){
    const e=game.enemies[i]; e.t+=dt; e.flap+=dt*12; e.y+=e.vy*dt;
    if(e.kind==='hornet' && e.y>H*0.18){ e.x+=Math.sign(p.x-e.x)*Math.min(Math.abs(p.x-e.x),130*dt); }
    else { e.x=e.baseX+Math.sin(e.t*(e.kind==='moth'?3.0:1.6))*e.sway; }
    e.fireT-=dt;
    if(e.fireT<=0 && e.y>0 && e.y<H*0.62){ emitP=0.9;
      switch(e.kind){
        case 'wasp': e.fireT=(1.0+Math.random()*0.7)*fMul; for(let k=-1;k<=1;k++){const a=Math.atan2(p.y-e.y,p.x-e.x)+k*0.26; eShot(e.x,e.y,Math.cos(a)*215*sMul,Math.sin(a)*215*sMul,5);} break;
        case 'hornet': e.fireT=(0.9+Math.random()*0.6)*fMul; aimShot(e.x,e.y,265*sMul); break;
        case 'beetle': e.fireT=(2.0+Math.random())*fMul; for(let k=0;k<8;k++){const a=k/8*7+e.t; eShot(e.x,e.y,Math.cos(a)*125*sMul,Math.sin(a)*125*sMul,5);} break;
        case 'moth': e.fireT=(2.2+Math.random())*fMul; aimShot(e.x,e.y,155*sMul); break;
        case 'spore': e.fireT=(1.8+Math.random())*fMul; for(let k=-1;k<=1;k++){const a=Math.PI/2+k*0.4; eShot(e.x,e.y,Math.cos(a)*150*sMul,Math.sin(a)*150*sMul,5);} break;
        case 'carrier': e.fireT=999; break;
        default: e.fireT=(1.5+Math.random()*1.1)*fMul; aimShot(e.x,e.y,190*sMul);
      }
      emitP=1;
    }
    if(e.y>H+44) game.enemies.splice(i,1);
  }

  // ボス
  if(game.boss){
    const bo=game.boss; bo.t+=dt; bo.spin+=dt;
    if(bo.enter){ bo.y+=(H*0.18-bo.y)*0.05; if(Math.abs(bo.y-H*0.18)<2) bo.enter=false; }
    else{
      if(bo.formT>0){ bo.formT-=dt; } // 最終形態への移行演出中はその場で静止
      if(bo.formT<=0){
      bo.moveT-=dt; if(bo.moveT<=0){ bo.tx=70+Math.random()*(W-140); bo.moveT=1.5+Math.random()*1.1; }
      bo.x+=(bo.tx-bo.x)*0.02;
      // ボス戦中も分身・⚡を供給（交互に投下）
      bo.dropT-=dt;
      if(bo.dropT<=0){ bo.dropT=6.5+Math.random()*2.5;
        const roll=Math.random(); let type;
        if(roll<0.10) type='shield';            // 低確率：シールド
        else if(roll<0.16) type='heart';        // 低確率：ハート
        else { bo.dropKind = bo.dropKind==='option'?'fever':'option'; type=bo.dropKind; }
        if(type==='option' && game.options.length>=MAX_OPTIONS) type='fever';
        game.items.push({x:bo.x,y:bo.y+bo.r*0.5,vy:95,r:(type==='heart'||type==='shield')?12:11,type});
      }
      } // 移行演出中は移動・投下を停止
      const ratio=bo.hp/bo.maxHp, np=ratio>0.6?1:ratio>0.3?2:3;
      if(np!==bo.phase){ const enterFinal=(np===3&&(bo.tier==='final'||bo.tier==='hidden')&&!bo.finalForm); bo.phase=np; burst(bo.x,bo.y,'#ff4fa3',30,300,.7); game.shake=10; if(enterFinal) startFinalForm(bo); }
      const fin=bo.tier==='final', hid=bo.tier==='hidden';
      const sp=bo.stage===4 ? (hid?1.55:fin?1.5:1.35) : bo.stage===3?1.38:bo.stage===2?1.3:1;
      if(bo.formT<=0){ bo.fireT-=dt;
      if(bo.fireT<=0){ emitP=0.75;
        if(fin||hid){
          if(bo.finalForm){ // 最終形態（強化パターン）
            if(hid){ hiddenFinalFire(bo,p,sp); }
            else { finalFinalFire(bo,p,sp); }
          } else { // フェーズ1-2
            if(hid){ hiddenFire(bo,p,sp); }
            else { finalFire(bo,p,sp); }
          }
        } else {
          // 通常ボス：ステージ別の弾幕
          if(bo.tier==='mid') bossFireMid(bo,p,sp);
          else if(bo.stage===1) bossFireS1(bo,p,sp);
          else if(bo.stage===2) bossFireS2(bo,p,sp);
          else bossFireS3(bo,p,sp);
        }
      emitP=1; }
      } // formT firing pause
      if(bo.hp<=0 && !bo.dead){
        bo.dead=true; burst(bo.x,bo.y,'#ff4fa3',80,420,1.1); burst(bo.x,bo.y,'#ffd34d',60,360,1.0);
        game.shake=24; vibrate([60,40,60,40,120]); const sc0=game.score; addScore(5000*bo.stage*(1+game.loop)); popScore(bo.x,bo.y,game.score-sc0,true); game.boss=null;
        if(bo.stage===4){
          if(bo.tier==='mid'){ game.midDone=true; game.wave=4; game.spawnT=0.8; game.bossWarn=0; game.banner={t:2.4,title:'MID-BOSS DOWN',sub:'INTO THE CORE'}; sfx.stage(); }
          else if(bo.tier==='final'){ game.finalDone=true;
            if(game.loop>=1){ game.banner={t:2.6,title:'⚠ TRUE BOSS ⚠',sub:'HIDDEN BOSS APPEARS'}; game.bossWarn=0; sfx.boss(); }
            else startEnding(); }
          else startEnding(); // hidden
        } else {
          game.transNext=bo.stage+1; game.transTo=2.6;
          game.carryFever=game.feverLevel; game.carryOpt=game.options.length; // 強化状態を記録
          game.banner={t:2.6,title:'STAGE '+(game.loop*4+bo.stage)+' CLEAR',sub:bo.stage===1?'…TO THE FOREST':bo.stage===2?'…TO THE SKY':'…TO THE ENEMY BASE'}; sfx.stage();
        }
      }
    }
  }

  // 敵弾：移動・グレイズ・被弾（シールドで無効化）
  const gx=p.x,gy=p.y, slowF=game.slowT>0?0.28:1;
  for(let i=game.eBullets.length-1;i>=0;i--){
    const b=game.eBullets[i]; b.x+=b.vx*dt*slowF; b.y+=b.vy*dt*slowF;
    if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){ game.eBullets.splice(i,1); continue; }
    const dx=b.x-gx,dy=b.y-gy,d2=dx*dx+dy*dy, hitR=p.r+b.r;
    if(d2<hitR*hitR){ if(game.shieldT>0){ burst(b.x,b.y,'#5fe3ff',6,150,.3); sfx.shieldHit(); } else hitPlayer(); game.eBullets.splice(i,1); continue; }
    const gR=hitR+GRAZE_MARGIN; if(!b.grazed && d2<gR*gR){ b.grazed=true; const over=Math.sqrt(d2)-hitR; const tier=over<13?1:0; doGraze(b.x,b.y,tier); }
  }

  // アイテム
  for(let i=game.items.length-1;i>=0;i--){
    const it=game.items[i]; it.y+=it.vy*dt;
    if((it.x-p.x)**2+(it.y-p.y)**2<(it.r+14)**2){
      if(it.type==='option'){ if(game.options.length<MAX_OPTIONS){ game.options.push({x:p.x,y:p.y,t:OPTION_DUR}); } else { for(const o of game.options) o.t=OPTION_DUR; } sfx.option(); }
      else if(it.type==='heart'){ if(game.lives<MAX_LIVES) game.lives++; else addScore(1000); sfx.power(); }
      else if(it.type==='shield'){ game.shieldT=SHIELD_DUR; sfx.shield(); }
      else { game.fever=Math.min(FEVER_CAP,game.fever+28); sfx.power(); }
      burst(it.x,it.y,it.type==='heart'?'#ff5a7a':it.type==='option'?'#5fe3ff':it.type==='shield'?'#7fd0ff':'#ff4fa3',16,200,.5);

      ctx.fillStyle=col; ctx.globalAlpha=0.55+0.45*gl; ctx.shadowColor=col; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(0,0,pt.r*0.46,0,7); ctx.fill(); ctx.shadowBlur=0; ctx.globalAlpha=1;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(0,0,pt.r*0.18,0,7); ctx.fill();
      if(dmg<0.5){ ctx.strokeStyle='rgba(255,120,60,.85)'; ctx.lineWidth=1.4; ctx.beginPath(); ctx.moveTo(-pt.r*0.5,-pt.r*0.2); ctx.lineTo(-pt.r*0.05,pt.r*0.15); ctx.lineTo(pt.r*0.35,-pt.r*0.3); ctx.stroke(); }
    }
    ctx.restore();
  }
  ctx.restore();
}

// ====== 描画 ======
function render(){
  ctx.clearRect(0,0,W,H);
  if(state===ST.ENDING){ renderEnding(); return; }
  const theme=THEMES[game.stage]||THEMES[1];
  drawBackground(state===ST.PLAY?game.scroll:performance.now()/1000, game.feverLevel>0?2.2:1, theme);

  ctx.save();
  if(game.shake>0) ctx.translate((Math.random()-.5)*game.shake,(Math.random()-.5)*game.shake);

  for(const it of game.items){
    ctx.save(); ctx.translate(it.x,it.y);
    if(it.type==='heart'){ ctx.fillStyle='#ff5a7a'; ctx.shadowColor='#ff5a7a'; ctx.shadowBlur=10; ctx.font='bold 21px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('♥',0,1); ctx.shadowBlur=0; }
    else if(it.type==='option'){ ctx.fillStyle='#5fe3ff'; ctx.shadowColor='#5fe3ff'; ctx.shadowBlur=10; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(8,0); ctx.lineTo(0,9); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#06140d'; ctx.fillRect(-1.4,-4,2.8,8); ctx.fillRect(-4,-1.4,8,2.8); }
    else if(it.type==='shield'){ ctx.fillStyle='#7fd0ff'; ctx.shadowColor='#7fd0ff'; ctx.shadowBlur=10; ctx.beginPath(); for(let k=0;k<6;k++){const a=k/6*7-Math.PI/2; const px=Math.cos(a)*9,py=Math.sin(a)*9; k?ctx.lineTo(px,py):ctx.moveTo(px,py);} ctx.closePath(); ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#06203a'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('S',0,1); }
    else { ctx.fillStyle='#ff4fa3'; ctx.shadowColor='#ff4fa3'; ctx.shadowBlur=10; ctx.font='bold 19px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⚡',0,1); }
    ctx.restore();
  }
  for(const b of game.pBullets){ const pw=game.power;
    const halo=pw>=2?'rgba(255,80,80,.32)':pw>=1.5?'rgba(255,150,60,.30)':(b.big?'rgba(255,211,77,.30)':'rgba(122,255,216,.30)');
    const core=pw>=2?'#ff6a6a':pw>=1.5?'#ffae5a':(b.big?'#ffe78a':'#aeffe0');
    ctx.fillStyle=halo; ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r+2.5+(pw-1)*2,b.r*2+3+(pw-1)*4,0,0,7); ctx.fill();
    if(pw>=2){ ctx.shadowColor='#ff6a6a'; ctx.shadowBlur=8; }
    ctx.fillStyle=core; ctx.beginPath(); ctx.ellipse(b.x,b.y,b.r,b.r*2,0,0,7); ctx.fill(); ctx.shadowBlur=0; }
  for(const e of game.enemies) drawEnemy(e);
  if(game.boss) drawBoss(game.boss);
  for(const b of game.eBullets){ const warm=b.grazed?'255,211,77':'255,90,90'; ctx.fillStyle='rgba('+warm+',.30)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+3,0,7); ctx.fill();
    ctx.fillStyle=b.grazed?'#ffd34d':'#ff5a5a'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill(); ctx.fillStyle='rgba(255,255,255,.9)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r*0.42,0,7); ctx.fill(); }
  if(state===ST.PLAY){
    for(const o of game.options) drawOption(o);
    if(game.player){ const p=game.player;
      ctx.strokeStyle=game.feverLevel>0?'rgba(255,79,163,.35)':'rgba(255,211,77,.22)'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(p.x,p.y,p.r+GRAZE_MARGIN,0,7); ctx.stroke();
      drawPlayer(p);
      if(game.shieldT>0){ const pulse=0.55+0.45*Math.sin(game.time*10);
        ctx.strokeStyle='rgba(95,227,255,'+(0.55*pulse)+')'; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(p.x,p.y,22,0,7); ctx.stroke();
        ctx.strokeStyle='rgba(170,255,255,'+(0.3*pulse)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(p.x,p.y,26,0,7); ctx.stroke(); }
    }
  }
  for(const pa of game.parts){ const a=Math.max(0,pa.life/pa.max); ctx.globalAlpha=a; ctx.fillStyle=pa.color; ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  ctx.restore();

  // 被弾フラッシュ＆衝撃波（画面座標）
  if(game.hitFlash>0 && state===ST.PLAY){
    const a=Math.max(0,game.hitFlash/0.5);
    const rg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.2,W/2,H/2,Math.max(W,H)*0.72);
    rg.addColorStop(0,'rgba(255,40,40,0)'); rg.addColorStop(1,'rgba(255,30,30,'+(0.55*a)+')'); ctx.fillStyle=rg; ctx.fillRect(0,0,W,H);
    const rr=(1-a)*130+12; ctx.strokeStyle='rgba(255,255,255,'+(0.8*a)+')'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(game.hitPos.x,game.hitPos.y,rr,0,7); ctx.stroke();
    ctx.strokeStyle='rgba(255,90,90,'+(0.6*a)+')'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(game.hitPos.x,game.hitPos.y,rr*0.6,0,7); ctx.stroke();
  }
  if(game.formFlash>0 && state===ST.PLAY){
    const a=Math.max(0,game.formFlash/0.7), col=game.formColor||'255,59,107', bx=game.boss?game.boss.x:W/2, by=game.boss?game.boss.y:H*0.3;
    ctx.fillStyle='rgba('+col+','+(0.42*a)+')'; ctx.fillRect(0,0,W,H);
    const rr=(1-a)*Math.max(W,H)*0.9+20; ctx.strokeStyle='rgba(255,255,255,'+(0.85*a)+')'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(bx,by,rr,0,7); ctx.stroke();
    ctx.strokeStyle='rgba('+col+','+(0.7*a)+')'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(bx,by,rr*0.7,0,7); ctx.stroke();
  }
  if(game.grazeFlash>0 && state===ST.PLAY){ const a=Math.max(0,game.grazeFlash/0.32); ctx.fillStyle='rgba('+game.grazeCol+','+(0.20*a)+')'; ctx.fillRect(0,0,W,H); }
  if(state===ST.PLAY) for(const f of game.floats){ const a=Math.max(0,Math.min(1,f.life/f.max*1.5)); ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='800 italic '+f.size+'px Helvetica, sans-serif'; if(f.glow){ ctx.shadowColor=f.color; ctx.shadowBlur=10; } ctx.fillStyle=f.color; ctx.fillText(f.text,f.x,f.y); ctx.shadowBlur=0; ctx.restore(); }
  if(game.newBestPop>0 && state===ST.PLAY){ const a=Math.max(0,Math.min(1,game.newBestPop/0.3)), pop=1+0.4*Math.max(0,(1.9-game.newBestPop)/1.9);
    ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center'; ctx.font='800 italic '+Math.round(30*pop)+'px Helvetica, sans-serif'; ctx.fillStyle='#7affd8'; ctx.shadowColor='#7affd8'; ctx.shadowBlur=20; ctx.fillText('NEW BEST!',W/2,H*0.24); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore(); }

  if(state===ST.PLAY) drawHUD();
}
function renderEnding(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#0a0820'); g.addColorStop(1,'#04040c'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  for(const s of stars){ const yy=(s.y+game.time*((s.layer+1)*30))%H; ctx.fillStyle='rgba(200,215,255,'+(0.25+s.layer*0.2)+')'; ctx.fillRect(s.x,yy,s.r,s.r); }
  for(const pa of game.parts){ const a=Math.max(0,pa.life/pa.max); ctx.globalAlpha=a; ctx.fillStyle=pa.color; ctx.beginPath(); ctx.arc(pa.x,pa.y,pa.r,0,7); ctx.fill(); } ctx.globalAlpha=1;
  if(game.player) drawPlayer(game.player);
  const el=ENDING_DUR-game.endT; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  function line(txt,appear,size,color,y,italic){ const a=Math.max(0,Math.min(1,(el-appear)*1.3)); if(a<=0)return; ctx.globalAlpha=a; ctx.fillStyle=color; ctx.font='800 '+(italic?'italic ':'')+size+'px Helvetica, sans-serif'; ctx.fillText(txt,W/2,y); ctx.globalAlpha=1; }
  line('ALL CLEAR!',0.3,46,'#ffd34d',H*0.30,true);
  line('Thank you for playing!',1.8,24,'#eaf2ff',H*0.44,false);
  line('Created by A.M.',3.4,20,'#9fd0ff',H*0.54,false);
  line('SCORE  '+game.score.toLocaleString(),5.0,18,'#cdd8ee',H*0.64,false);
  if(game.endT<5){ ctx.globalAlpha=0.85; ctx.fillStyle='#7affd8'; ctx.font='600 15px sans-serif'; ctx.fillText('LOOP '+(game.loop+2)+'  STARTING SOON… '+Math.ceil(game.endT),W/2,H*0.78); ctx.globalAlpha=1; }
}

function drawHUD(){
  const pad=14, top=(window.__safeTop||0)+14;
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillStyle='#9fb0d0'; ctx.font='600 11px sans-serif'; ctx.fillText('SCORE'+(game.newBest?'  ★BEST':''),pad,top);
  ctx.font='800 italic 26px Helvetica, sans-serif';
  if(game.newBest){ ctx.fillStyle='#d7fff0'; ctx.shadowColor='#7affd8'; ctx.shadowBlur=10+5*Math.abs(Math.sin(game.time*5)); } else ctx.fillStyle='#fff';
  ctx.fillText(game.score.toLocaleString(),pad,top+12); ctx.shadowBlur=0;
  ctx.textAlign='right'; ctx.font='18px sans-serif'; let hx=W-pad;
  for(let i=0;i<5;i++){ ctx.fillStyle=i<game.lives?'#ff5a5a':'rgba(255,255,255,.16)'; ctx.fillText('♥',hx,top+44); hx-=22; }
  if(game.combo>=1){ const warn=game.comboTimer<0.7; ctx.textAlign='left'; ctx.fillStyle=(warn&&((game.time*10)|0)%2)?'#ff7a7a':'#ffd34d'; ctx.font='800 italic 18px Helvetica, sans-serif'; ctx.fillText(game.combo+' GRAZE',pad,top+44); }
  if(game.power>1){ ctx.textAlign='left'; const pc=game.power>=2?'#ff5a5a':'#ff9a3d'; ctx.fillStyle=pc; ctx.font='800 italic 15px Helvetica, sans-serif'; ctx.fillText('POWER ×'+game.power,pad,top+66); }

  const gw=Math.min(W-28,360), gx=(W-gw)/2, gy=H-(window.__safeBot||0)-26, gh=10;
  ctx.fillStyle='rgba(255,255,255,.12)'; roundRect(gx,gy,gw,gh,5); ctx.fill();
  if(game.feverLevel>0){ const r=Math.max(0,Math.min(1,(game.fever-game.feverLevel*FEVER_MAX)/FEVER_MAX)), c=FEVER_COL[game.feverLevel];
    ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=14; roundRect(gx,gy,gw*r,gh,5); ctx.fill(); ctx.shadowBlur=0;
    ctx.textAlign='center'; ctx.fillStyle=c; ctx.font='800 italic 13px Helvetica, sans-serif'; ctx.fillText(FEVER_NAME[game.feverLevel],W/2,gy-16);
  }else{ const r=Math.max(0,Math.min(1,game.fever/FEVER_MAX)); ctx.fillStyle='#ffd34d'; ctx.shadowColor='#ffd34d'; ctx.shadowBlur=r>0.95?16:6; roundRect(gx,gy,gw*r,gh,5); ctx.fill(); ctx.shadowBlur=0;
    ctx.textAlign='center'; ctx.fillStyle='#9fb0d0'; ctx.font='600 11px sans-serif'; ctx.fillText('FEVER GAUGE',W/2,gy-15); }
  if(game.shieldT>0){ ctx.textAlign='center'; ctx.fillStyle='#7fd0ff'; ctx.font='800 italic 12px Helvetica, sans-serif'; ctx.fillText('◆ SHIELD '+game.shieldT.toFixed(1),W/2,gy-34); }

  ctx.textAlign='right'; ctx.fillStyle='#9fb0d0'; ctx.font='600 11px sans-serif'; ctx.fillText((THEMES[game.stage]||THEMES[1]).name+'  ·  STAGE '+(game.loop*4+game.stage),W-pad,top);
  if(game.loop>0){ ctx.fillStyle='#7affd8'; ctx.font='800 italic 12px Helvetica, sans-serif'; ctx.fillText('LOOP '+(game.loop+1),W-pad,top+16); }

  if(game.boss && !game.boss.enter){
    const bw=Math.min(W-44,300), bx=(W-bw)/2, by=top+82, bh=8;
    ctx.fillStyle='rgba(255,255,255,.14)'; roundRect(bx,by,bw,bh,4); ctx.fill();
    const r=Math.max(0,game.boss.hp/game.boss.maxHp); ctx.fillStyle=game.boss.phase===3?'#ff3b6b':'#ff5a8a'; roundRect(bx,by,bw*r,bh,4); ctx.fill();
    const lab=game.boss.tier==='mid'?'MID-BOSS':game.boss.tier==='final'?'FINAL BOSS':game.boss.tier==='hidden'?'HIDDEN BOSS':'BOSS';
    ctx.textAlign='center'; ctx.fillStyle=game.boss.tier==='hidden'?'#ffcf3d':'#ff8ac4'; ctx.font='800 italic 11px Helvetica, sans-serif'; ctx.fillText(lab+(game.boss.finalForm?'  ◆FINAL FORM':''),W/2,by-13);
    const pts=game.boss.parts||[];
    for(let i=0;i<pts.length;i++){ const pt=pts[i], pcx=bx+8+i*15, pcy=by+bh+8;
      ctx.fillStyle=pt.dead?'rgba(120,120,132,.55)':(pt.role==='spread'?'#ff9a3d':'#5fbfff'); ctx.beginPath(); ctx.arc(pcx,pcy,4,0,7); ctx.fill();
      if(pt.dead){ ctx.strokeStyle='rgba(20,20,24,.9)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(pcx-2.4,pcy-2.4); ctx.lineTo(pcx+2.4,pcy+2.4); ctx.moveTo(pcx+2.4,pcy-2.4); ctx.lineTo(pcx-2.4,pcy+2.4); ctx.stroke(); } }
  }
  if(game.bossWarn>0){
    const blink=Math.floor(game.bossWarn*6)%2; const hid=game.boss&&game.boss.tier==='hidden';
    ctx.textAlign='center'; ctx.fillStyle=blink?(hid?'#ffcf3d':'#ff3b6b'):'#ffd34d'; ctx.font='800 italic 34px Helvetica, sans-serif';
    ctx.fillText(hid?'⚠ TRUE BOSS ⚠':'⚠ WARNING ⚠',W/2,H*0.42);
    const lab=game.boss?(game.boss.tier==='mid'?'MID-BOSS':game.boss.tier==='final'?'FINAL BOSS':game.boss.tier==='hidden'?'HIDDEN BOSS':'BOSS'):'BOSS';
    ctx.fillStyle='#fff'; ctx.font='600 13px sans-serif'; ctx.fillText(lab+' APPROACHING',W/2,H*0.42+42);
  }
  if(game.banner.t>0){
    ctx.globalAlpha=Math.max(0,Math.min(1,game.banner.t,1.4));
    ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='800 italic 40px Helvetica, sans-serif'; ctx.fillText(game.banner.title,W/2,H*0.40);
    ctx.fillStyle='#cdd8ee'; ctx.font='600 16px sans-serif'; ctx.fillText(game.banner.sub,W/2,H*0.40+50); ctx.globalAlpha=1;
  }
  if(game.powerPop){ const pp=game.powerPop, a=Math.max(0,Math.min(1,pp.t/0.3)), pop=1+0.5*Math.max(0,(1.3-pp.t)/1.3);
    const pc=pp.n>=2?'#ff5a5a':'#ff9a3d'; ctx.save(); ctx.globalAlpha=a; ctx.textAlign='center';
    ctx.font='800 italic '+Math.round(34*pop)+'px Helvetica, sans-serif'; ctx.fillStyle=pc; ctx.shadowColor=pc; ctx.shadowBlur=18;
    ctx.fillText('POWER ×'+pp.n,W/2,H*0.30); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore(); }
}
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ====== ループ ======
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;
  if(state===ST.PLAY) update(dt); else if(state===ST.ENDING) endingUpdate(dt);
  render(); requestAnimationFrame(loop);
}

// ====== 説明文のみ多言語（EN既定 / JP） ======
const RULES_I18N={
  en:'<div class="ri">Drag to <b>move</b> · <b>auto-fire</b></div>'+
    '<div class="ri"><span class="gz">Graze</span> bullets to score &amp; charge the <span class="fv">gauge</span></div>'+
    '<div class="ri"><span class="fv">FEVER 3WAY×2</span> → <span class="sp">5WAY×3</span> → <b>7WAY×4</b></div>'+
    '<div class="ri"><span class="op">Option 10s</span> · <span class="op">Shield 5s</span> · <span class="fv">⚡ Boost</span></div>'+
    '<div class="ri">Clear 4 stages, then <b>loop</b> — harder each round</div>',
  jp:'<div class="ri">指で<b>ドラッグ移動</b> · <b>自動発射</b></div>'+
    '<div class="ri">敵弾を<span class="gz">掠めて</span>得点＆<span class="fv">ゲージ</span>上昇</div>'+
    '<div class="ri"><span class="fv">FEVER 3WAY×2</span> → <span class="sp">5WAY×3</span> → <b>7WAY×4</b></div>'+
    '<div class="ri"><span class="op">分身 10秒</span> · <span class="op">シールド 5秒</span> · <span class="fv">⚡加速</span></div>'+
    '<div class="ri">全4ステージ制覇 → <b>周回</b>（毎周ごとに難化）</div>',
};
let lang='en'; try{ lang=(localStorage.getItem('gf_lang')==='jp')?'jp':'en'; }catch(e){}
function $(id){ return document.getElementById(id); }
function updCtrlLabel(){ $('ctrlBtn').textContent='CONTROL: '+(relCtrl?'RELATIVE':'DIRECT'); }
function applyLang(){
  $('rules').innerHTML=RULES_I18N[lang]||RULES_I18N.en;
  document.querySelectorAll('#langToggle .lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
}
document.querySelectorAll('#langToggle .lang-btn').forEach(b=>{
  b.addEventListener('click',e=>{ e.stopPropagation(); lang=b.dataset.lang;
    try{ localStorage.setItem('gf_lang',lang); }catch(e){} initAudio(); sfx.ui(); applyLang(); });
});

function startGame(){
  initAudio(); if(AC&&AC.state==='suspended') AC.resume();
  sfx.start();
  $('nameEntry').classList.add('hidden'); $('myrank').classList.add('hidden'); $('rankView').classList.add('hidden');
  resetGame(); state=ST.PLAY; Music.variant=1;
  $('menu').classList.add('hidden'); $('over').classList.add('hidden');
  Music.start();
}
$('startBtn').addEventListener('click',startGame);
$('ctrlBtn').addEventListener('click',()=>{ relCtrl=!relCtrl; try{localStorage.setItem('gf_ctrl',relCtrl?'rel':'abs');}catch(e){} updCtrlLabel(); });
$('retryBtn').addEventListener('click',startGame);
// タイトルからランキングを閲覧
$('rankBtn').addEventListener('click',()=>{ initAudio(); if(AC&&AC.state==='suspended') AC.resume(); if(AC) sfx.ui();
  $('menu').classList.add('hidden'); $('rankView').classList.remove('hidden'); renderRankView('all'); });
$('rankBackBtn').addEventListener('click',()=>{ if(AC) sfx.ui(); $('rankView').classList.add('hidden'); $('menu').classList.remove('hidden'); });
document.querySelectorAll('#rankViewTabs .rank-tab').forEach(b=>{
  b.addEventListener('click',()=>{ if(AC) sfx.ui(); renderRankView(b.dataset.kind); });
});
// ランキング：名前送信
$('submitBtn').addEventListener('click',async()=>{
  const nm=(($('nameInput').value||'').trim().slice(0,10))||'YOU';
  lastName=nm; try{ localStorage.setItem('gf_name',nm); }catch(e){}
  if(mySubmitEntry) mySubmitEntry.name=nm;
  const sb=$('submitBtn'); sb.disabled=true; sb.textContent='…';
  const key=await submitScore(mySubmitEntry); myEntryKey=key;
  $('nameEntry').classList.add('hidden'); if(AC) sfx.power();
  renderRanking(currentTab);
});
$('nameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') $('submitBtn').click(); });
// ランキング：タブ切替
document.querySelectorAll('#rankTabs .rank-tab').forEach(b=>{
  b.addEventListener('click',()=>{ if(AC) sfx.ui(); renderRanking(b.dataset.kind); });
});
updCtrlLabel(); applyLang();

(function(){ const probe=document.createElement('div'); probe.style.cssText='position:fixed;top:env(safe-area-inset-top,0);bottom:env(safe-area-inset-bottom,0);';
  document.body.appendChild(probe); window.__safeTop=parseInt(getComputedStyle(probe).top)||0; window.__safeBot=parseInt(getComputedStyle(probe).bottom)||0; probe.remove(); })();

resize();
requestAnimationFrame(loop);
})();
</script>
